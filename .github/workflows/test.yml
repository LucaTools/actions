name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  test-install-latest:
    name: Install latest Luca CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Luca (latest, no tools)
        uses: ./

      - name: Verify luca is on PATH
        run: luca --version

  test-install-pinned:
    name: Install pinned Luca CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Luca (pinned, no tools)
        uses: ./
        with:
          version: "0.7.0"

      - name: Verify pinned version is installed
        run: |
          luca --version
          INSTALLED=$(luca --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ "$INSTALLED" != "0.7.0" ]; then
            echo "Expected 0.7.0, got $INSTALLED"
            exit 1
          fi

  test-install-tools-macos:
    name: Install Luca CLI and tools (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Write a minimal Lucafile that installs a small, publicly available tool.
      - name: Create fixture Lucafile
        run: |
          cat > Lucafile <<'EOF'
          ---
          tools:
            - name: SwiftLint
              binaryPath: SwiftLintBinary.artifactbundle/swiftlint-0.61.0-macos/bin/swiftlint
              version: 0.61.0
              url: https://github.com/realm/SwiftLint/releases/download/0.61.0/SwiftLintBinary.artifactbundle.zip
            - name: Tuist
              binaryPath: tuist
              version: 4.80.0
              url: https://github.com/tuist/tuist/releases/download/4.80.0/tuist.zip
            
          EOF

      - name: Setup Luca (with tools)
        uses: ./
        with:
          spec: Lucafile

      - name: Verify tools are on PATH
        run: |
          TUIST_VERSION=$(tuist version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ "$TUIST_VERSION" != "4.80.0" ]; then
            echo "Expected tuist 4.80.0, got $TUIST_VERSION"
            exit 1
          fi

          SWIFTLINT_VERSION=$(swiftlint version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ "$SWIFTLINT_VERSION" != "0.61.0" ]; then
            echo "Expected swiftlint 0.61.0, got $SWIFTLINT_VERSION"
            exit 1
          fi

      - name: Verify tools are symlinked to tools directory
        run: |
          LINK=$(readlink .luca/tools/tuist)
          EXPECTED="$HOME/.luca/tools/Tuist/4.80.0/tuist"
          if [ "$LINK" != "$EXPECTED" ]; then
            echo "Expected symlink target '$EXPECTED', got '$LINK'"
            exit 1
          fi

          LINK=$(readlink .luca/tools/swiftlint)
          EXPECTED="$HOME/.luca/tools/SwiftLint/0.61.0/SwiftLintBinary.artifactbundle/swiftlint-0.61.0-macos/bin/swiftlint"
          if [ "$LINK" != "$EXPECTED" ]; then
            echo "Expected symlink target '$EXPECTED', got '$LINK'"
            exit 1
          fi

  test-install-tools-linux:
    name: Install Luca CLI and tools (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Write a minimal Lucafile that installs a small, publicly available tool.
      - name: Create fixture Lucafile
        run: |
          cat > Lucafile <<'EOF'
          ---
          tools:
            - name: yq
              desiredBinaryName: yq
              version: 4.52.4
              url: https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64

          EOF

      - name: Setup Luca (with tools)
        uses: ./
        with:
          spec: Lucafile

      - name: Verify tools are on PATH
        run: |
          YQ_VERSION=$(yq --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ "$YQ_VERSION" != "4.52.4" ]; then
            echo "Expected yq 4.52.4, got $YQ_VERSION"
            exit 1
          fi

      - name: Verify tools are symlinked to tools directory
        run: |
          LINK=$(readlink .luca/tools/yq)
          EXPECTED="$HOME/.luca/tools/yq/4.52.4/yq"
          if [ "$LINK" != "$EXPECTED" ]; then
            echo "Expected symlink target '$EXPECTED', got '$LINK'"
            exit 1
          fi
